services:
  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: ${postgres_user}
      POSTGRES_PASSWORD: ${postgres_password}
      POSTGRES_DB: ${postgres_db}

    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data 
  
  redis:
    image: redis:latest

    ports:
      - "6379:6379"
    
  api:
    build: .

    ports:
      - "8000:8000"
    
    env_file:
      - .env
    
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: